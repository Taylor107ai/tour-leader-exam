<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>領隊領牌考試 溫習指南</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;padding-bottom:3rem}
.top-bar{background:#1a1a1a;color:#fff;padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:12px}
.top-bar h1{font-size:15px;font-weight:500;letter-spacing:0.3px}
.top-bar span{font-size:11px;color:#888}
.body{max-width:700px;margin:0 auto;padding:16px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{background:#fff;border-radius:10px;padding:12px 8px;text-align:center;border:1px solid #e8e6e0}
.stat-n{font-size:20px;font-weight:600;color:#1a1a1a}
.stat-l{font-size:10px;color:#888;margin-top:2px}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#aaa}
input[type=text]{width:100%;padding:10px 12px 10px 38px;border-radius:10px;border:1px solid #e0ded8;background:#fff;font-size:14px;color:#1a1a1a;outline:none}
input[type=text]:focus{border-color:#888}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tab{font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#555;transition:all 0.15s;white-space:nowrap}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.freq-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;margin-left:5px}
.freq-high{background:#fee2e2;color:#991b1b}
.freq-med{background:#fef3c7;color:#92400e}
.freq-low{background:#dcfce7;color:#166534}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;margin-bottom:10px;overflow:hidden}
.card-header{padding:14px 16px;cursor:pointer;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;-webkit-tap-highlight-color:transparent}
.card-header:active{background:#f9f8f5}
.q-meta{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.q-type{font-size:10px;color:#aaa;background:#f5f4f0;padding:2px 6px;border-radius:5px}
.cat-badge{font-size:10px;padding:2px 7px;border-radius:8px}
.cat-0{background:#dbeafe;color:#1e40af}
.cat-1{background:#ede9fe;color:#5b21b6}
.cat-2{background:#d1fae5;color:#065f46}
.cat-3{background:#fef3c7;color:#92400e}
.cat-4{background:#fee2e2;color:#991b1b}
.cat-5{background:#ecfdf5;color:#047857}
.cat-6{background:#fce7f3;color:#9d174d}
.cat-7{background:#f3f4f6;color:#374151}
.q-text{font-size:14px;font-weight:500;color:#1a1a1a;line-height:1.5}
.chevron{font-size:11px;color:#bbb;flex-shrink:0;margin-top:3px;transition:transform 0.2s;display:inline-block}
.chevron.open{transform:rotate(90deg)}
.card-body{display:none;padding:0 16px 16px;border-top:1px solid #f0ede6}
.card-body.open{display:block}
.ans-label{font-size:10px;font-weight:600;color:#aaa;letter-spacing:0.8px;margin:12px 0 8px;text-transform:uppercase}
.ans-item{display:flex;gap:8px;margin-bottom:7px;align-items:flex-start}
.ans-dot{width:20px;height:20px;border-radius:50%;background:#f5f4f0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#888;flex-shrink:0;margin-top:1px}
.ans-text{font-size:13px;color:#333;line-height:1.65}
.tip{background:#fffbeb;border-left:3px solid #f59e0b;border-radius:0 8px 8px 0;padding:8px 12px;margin-top:10px;font-size:12px;color:#78350f;line-height:1.5}
.empty{text-align:center;padding:3rem;color:#aaa;font-size:14px}
.section-divider{font-size:11px;color:#aaa;padding:8px 4px 4px;letter-spacing:0.5px}
</style>
</head>
<body>

<div class="top-bar">
  <h1>領隊領牌考試 溫習指南</h1>
  <span>歷屆題目整合</span>
</div>

<div class="body">
  <div class="stats">
    <div class="stat"><div class="stat-n">60+</div><div class="stat-l">整合題目</div></div>
    <div class="stat"><div class="stat-n">8</div><div class="stat-l">分類</div></div>
    <div class="stat"><div class="stat-n" style="font-size:13px;padding-top:3px">必背</div><div class="stat-l">危機處理八項</div></div>
    <div class="stat"><div class="stat-n" style="font-size:13px;padding-top:3px">MC+問答</div><div class="stat-l">題型</div></div>
  </div>

  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="搜尋題目關鍵字..." oninput="filterCards()">
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab(this,'all')">全部</button>
    <button class="tab" onclick="setTab(this,'crisis')">危機處理</button>
    <button class="tab" onclick="setTab(this,'service')">增值服務</button>
    <button class="tab" onclick="setTab(this,'legal')">法例法規</button>
    <button class="tab" onclick="setTab(this,'activities')">戶外活動</button>
    <button class="tab" onclick="setTab(this,'hotel')">酒店住宿</button>
    <button class="tab" onclick="setTab(this,'leader')">領隊角色</button>
    <button class="tab" onclick="setTab(this,'study')">遊學團</button>
    <button class="tab" onclick="setTab(this,'transport')">交通出行</button>
  </div>

  <div id="cardList"></div>
</div>

<script>
const CATS=['法例法規','危機處理','增值服務','領隊角色','戶外活動','酒店住宿','遊學團','交通出行'];
const CAT_KEYS=['legal','crisis','service','leader','activities','hotel','study','transport'];

const data=[
{cat:'legal',freq:'high',q:'【必考MC】國安法涵蓋範圍及立法目的',type:'MC',
ans:['《香港國家安全法》涵蓋：分裂國家、顛覆國家政權、恐怖活動、勾結外國或境外勢力危害國家安全','不包括個人日常言論自由（但煽動性言論除外）','領隊職責：若旅途中有涉及國安法的情況，應向當局通報，不應協助或縱容'],
tip:'考法：通常考哪項「不屬於」國安法範疇，要識揀錯誤選項'},
{cat:'legal',freq:'high',q:'【必考MC】防止賄賂條例 — 利益範圍及抗辯理由',type:'MC',
ans:['「利益」定義：金錢、禮品、服務、貸款、職位等有價值的事物','不包括「款待」：即當場享用的食物或飲品（例如一頓飯、一杯酒）','抗辯理由：須得到主人（持牌旅行代理商）的許可或授權','收受佣金必須向旅行社申報及獲批准'],
tip:'常考：「以下哪項不屬於利益？」答案通常是當場享用的飲食'},
{cat:'legal',freq:'high',q:'旅遊業賠償基金 — 賠償金額、印花稅、不賠原因',type:'問答',
ans:['特惠賠償：因旅行代理商問題導致外遊旅客死亡或受傷，最高賠償 HK$30萬（以報銷實際開支為準）','電子印花稅：每張外遊旅行服務合約收取合約價格的 0.1%','印花顯示內容：旅行社名稱、旅客姓名、行程目的地、出發日期、合約金額、印花編號','三個不賠原因：① 旅行社仍在正常營業 ② 旅客已從其他途徑獲賠 ③ 索償超出法定時限'],
tip:'金額 $30萬 及印花稅 0.1% 必須背熟，MC 常考'},
{cat:'legal',freq:'high',q:'個人資料私隱條例 — 四至六項原則（T/F 及問答均有考）',type:'問答',
ans:['① 收集原則：資料收集須有合法目的，只收集必要資料','② 準確原則：資料須保持準確及最新','③ 使用原則：資料只可用於收集時的原定目的','④ 保安原則：須採取合理措施防止資料未經授權使用或洩露','⑤ 公開原則：須告知當事人資料的用途及查閱權','⑥ 查閱及改正原則：當事人有權查閱及更正個人資料'],
tip:'是非題常考原則定義，問答常考「列出三至四項原則」'},
{cat:'legal',freq:'med',q:'旅遊業條例實施日期（MC/T/F）',type:'MC',
ans:['《旅遊業條例》（第 634 章）：於 2021 年 11 月 1 日正式生效','旅遊業監管局（旅監局）由該日起負責規管旅行社及領隊/導遊的發牌事宜','《持牌人指令》：持牌旅行代理商向領隊發出的服務指引，具法律約束力'],
tip:'「2021年11月1日」是常考日期'},
{cat:'legal',freq:'high',q:'外遊警示級別 — 三色定義（填空/問答）',type:'問答',
ans:['🔴 紅色：有明顯威脅，應調整行程，如非必要避免前赴','🟡 黃色：有威脅跡象，留意局勢，提高警惕','⚫ 黑色：有嚴重威脅，不應前赴該地'],
tip:'黑>紅>黃嚴重程度順序要記清楚，填空題必考'},
{cat:'legal',freq:'low',q:'持牌人指令 — 定義、對象及服務協議內容',type:'T/F+問答',
ans:['定義：持牌旅行代理商就其外遊旅行服務向受僱領隊發出的書面指令','對象：持牌旅行代理商（旅行社）→ 受委任領隊','服務協議內容：職責說明、行程細節、緊急聯絡安排、費用處理、小費安排、離團規定','離團費：領隊私自帶團友離開行程或自費活動，須向旅行社匯報']},

{cat:'crisis',freq:'high',q:'【必考】八項處理危機及突發事故的考慮因素',type:'問答',
ans:['① 保障人命安全（首要）','② 評估事件的嚴重性及影響範圍','③ 聯絡相關緊急服務（警察、救護、醫院）','④ 通知旅行社及持牌代理商','⑤ 妥善安置及照顧團友','⑥ 保存相關文件及記錄（收據、醫療報告等）','⑦ 安排後備方案，盡量繼續行程','⑧ 跟進及匯報事件結果'],
tip:'八項必須全部背熟！常要求「列出全部八項」或「選出三項並解釋為何重要」'},
{cat:'crisis',freq:'high',q:'七項危機處理技巧及程序（應用題）',type:'問答',
ans:['① 保持冷靜，穩定現場秩序','② 迅速評估情況，判斷危險程度','③ 即時通報：警察/救護/旅行社','④ 安置及照顧傷者或受影響團友','⑤ 向其他團友解釋及安撫情緒','⑥ 執行後備方案（改變行程/更換酒店等）','⑦ 詳細記錄事件，收集文件證明']},
{cat:'crisis',freq:'high',q:'處理投訴的原則（四項）及技巧（三項）',type:'問答',
ans:['四項投訴處理原則：① 聆聽 ② 同理 ③ 道歉（代表旅行社）④ 行動','三項處理技巧：① 保持專業冷靜，不與客人爭論 ② 提出具體解決方案 ③ 跟進確認客人是否滿意','處理步驟：先聆聽完整投訴 → 表達同理心 → 核實事實 → 提出解決方案 → 跟進'],
tip:'「投訴四原則：聆聽→同理→道歉→行動」是送分題'},
{cat:'crisis',freq:'high',q:'車輛中途拋錨的危機處理（四項解決方法）',type:'案例問答',
ans:['① 立即疏散旅客到安全地點，遠離車道','② 通知旅行社及當地緊急聯絡人安排替換車輛','③ 向團友解釋情況，安撫情緒，說明預計等候時間','④ 若延誤影響行程，調整後續安排並作出適當補償']},
{cat:'crisis',freq:'high',q:'恐怖襲擊的三個處理方法',type:'問答',
ans:['① 立即帶領團友疏散至安全地點，遠離事發地點','② 通報警方及旅行社，等候官方指示，切勿自行判斷','③ 清點人數，照顧受傷或受驚嚇的團友，提供心理支援']},
{cat:'crisis',freq:'med',q:'團友在旅途中意外受傷的四項處理方法',type:'案例問答',
ans:['① 立即評估傷勢，若嚴重即召救護車','② 陪同或安排專人陪同傷者就醫','③ 通知旅行社，協助傷者聯絡家屬','④ 協助傷者整理保險索償文件（醫療報告、收據）']},
{cat:'crisis',freq:'med',q:'團友在市集/景點走失的四項處理方法',type:'案例問答',
ans:['① 立即清點人數，確認走失人數及最後見到的地點','② 在原地等候或派人返回最後見面地點尋找','③ 廣播或通知景點/市集工作人員協助尋找','④ 聯絡警方，通報走失者特徵，並通知旅行社']},
{cat:'crisis',freq:'med',q:'兩名團友爭執衝突的四項處理方法',type:'案例問答',
ans:['① 立即介入，保持冷靜，請雙方暫時分開冷靜','② 分別聆聽雙方的意見，瞭解起因','③ 保持中立，不偏袒任何一方，嘗試調解','④ 若情況嚴重影響其他團友，考慮調整座位或房間安排']},
{cat:'crisis',freq:'med',q:'酒店無房（被通知海景房維修）的解決方法及爭取補償',type:'案例問答',
ans:['解決方法：① 要求酒店提供同等或更好的替代房間 ② 若同一酒店無法解決，聯絡旅行社另覓同級酒店 ③ 向客人解釋及道歉，說明安排','爭取補償：① 要求酒店提供免費早餐或餐飲優惠 ② 要求房間升級（免費）③ 要求退還差價或現金補償']},
{cat:'crisis',freq:'med',q:'飛機上遺失護照的三個處理方法',type:'問答',
ans:['① 立即通知機組人員協助廣播尋找','② 抵達目的地後向航空公司失物認領處登記','③ 聯絡香港領事館或入境處，申請緊急旅行文件']},
{cat:'crisis',freq:'med',q:'旅行期間黑色颱風/暴風雨警告發出的處理',type:'問答',
ans:['① 立即通知全體團友留在酒店/安全室內，取消所有戶外活動','② 密切關注天文台/當地氣象預報，等候警報解除','③ 通知旅行社，評估是否需要更改行程或提早/延遲回港','④ 若困在戶外，尋找就近堅固建築物避風']},
{cat:'crisis',freq:'low',q:'15分鐘後飛機起飛但團友仍未到達機場的四個解決方法',type:'案例問答',
ans:['① 嘗試多次致電該團友，確認其位置及預計到達時間','② 通知航空公司地勤，要求延遲登機（若情況許可）','③ 通知旅行社，取得旅行社指示','④ 若最終未能趕上，協助該團友安排下一班機，並確保其他團友準時登機']},

{cat:'service',freq:'high',q:'提供增值服務對旅行代理商的好處（三至四項）',type:'問答',
ans:['① 提升客戶滿意度，增加回頭率及口碑推薦','② 增加額外收入（自費活動、升級安排等）','③ 與競爭對手區別，建立品牌差異化','④ 加強旅行社與客人的長期關係，提高客戶忠誠度']},
{cat:'service',freq:'high',q:'增值服務的技巧（四項）及如何令團友滿意',type:'問答',
ans:['① 了解團友需求：出發前收集資料（飲食習慣、特殊需要、喜好）','② 主動建議：適時推介合適的自費活動或升級選項','③ 個人化服務：針對不同團友（長者、新婚、小孩）提供針對性建議','④ 跟進服務：活動後詢問團友感受，確保滿意'],
tip:'「了解需要→主動建議→個人化→跟進」四步曲'},
{cat:'service',freq:'high',q:'有小孩、長者、新婚夫婦的旅行團 — 增值服務建議',type:'案例問答',
ans:['長者：① 安排無障礙房間（低層、近電梯）② 提供輪椅或協助行動 ③ 推介輕鬆路線或文化導賞','小孩：① 安排有兒童設施的酒店 ② 推介親子活動 ③ 安排兒童餐','新婚夫婦：① 要求酒店安排蜜月佈置 ② 推介浪漫晚餐或日落遊船 ③ 安排驚喜（鮮花、蛋糕）']},
{cat:'service',freq:'high',q:'在沙漠/古城/異國文化景點提供增值服務的四項建議',type:'案例問答',
ans:['① 安排專業本地導賞員講解歷史文化','② 推介特色文化體驗（傳統服裝試穿、本地工藝體驗）','③ 推薦正宗本地餐廳品嚐當地美食','④ 提供相關書籍、紀念品或影片資源，加深了解']},
{cat:'service',freq:'med',q:'在餐廳的四項關顧及對餐廳的四項監察',type:'問答',
ans:['關顧團友（四項）：① 確認座位舒適，照顧特殊飲食需要 ② 介紹菜式，翻譯菜單 ③ 協助有需要的長者或小孩 ④ 確保食物符合宗教或飲食習慣要求','監察餐廳（四項）：① 檢查食物衛生及環境清潔 ② 確認菜式與合約相符 ③ 留意食物溫度及新鮮度 ④ 若有問題即時向餐廳經理反映並記錄']},

let currentTab='all';
let currentSearch='';

function setTab(el,key){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentTab=key;
  renderCards();
}
function filterCards(){
  currentSearch=document.getElementById('searchInput').value.toLowerCase();
  renderCards();
}
function renderCards(){
  const list=document.getElementById('cardList');
  const filtered=data.filter(item=>{
    const matchTab=currentTab==='all'||item.cat===currentTab;
    const matchSearch=!currentSearch||item.q.toLowerCase().includes(currentSearch)||item.ans.some(a=>a.toLowerCase().includes(currentSearch));
    return matchTab&&matchSearch;
  });
  if(!filtered.length){list.innerHTML='<div class="empty">沒有相關題目</div>';return;}
  list.innerHTML=filtered.map((item,i)=>{
    const catIdx=CAT_KEYS.indexOf(item.cat);
    const freqMap={high:'必考',med:'常考',low:'偶考'};
    const freqClass={high:'freq-high',med:'freq-med',low:'freq-low'};
    const ansHtml=item.ans.map((a,j)=>`<div class="ans-item"><div class="ans-dot">${j+1}</div><div class="ans-text">${a}</div></div>`).join('');
    const tipHtml=item.tip?`<div class="tip">💡 考試貼士：${item.tip}</div>`:'';
    return `<div class="card" data-id="${i}">
      <div class="card-header" onclick="toggleCard(${i})">
        <div style="flex:1">
          <div class="q-meta">
            <span class="q-type">${item.type}</span>
            <span class="cat-badge cat-${catIdx}">${CATS[catIdx]}</span>
            <span class="freq-badge ${freqClass[item.freq]}">${freqMap[item.freq]}</span>
          </div>
          <div class="q-text">${item.q}</div>
        </div>
        <div class="chevron" id="chev-${i}">▶</div>
      </div>
      <div class="card-body" id="body-${i}">
        <div class="ans-label">標準答案要點</div>
        ${ansHtml}
        ${tipHtml}
      </div>
    </div>`;
  }).join('');
}
function toggleCard(i){
  document.getElementById('body-'+i).classList.toggle('open');
  document.getElementById('chev-'+i).classList.toggle('open');
}
renderCards();
</script>
